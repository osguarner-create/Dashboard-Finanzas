<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0D1117">
<meta name="description" content="Panel financiero personal — ingresos, gastos, presupuesto, deudas, inversiones y patrimonio en un solo lugar.">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finanzas">
<meta name="mobile-web-app-capable" content="yes">

<title>Finanzas — Panel Ejecutivo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root{
    /* Paleta — GitHub Dark inspirada, uso sobrio */
    --bg:#0D1117;           /* fondo principal */
    --surface:#161B22;      /* fondo secundario / sidebar / topbar */
    --surface-2:#1C2128;    /* cards */
    --line:#30363D;         /* bordes */
    --line-soft:#21262D;    /* divisores sutiles */
    --text:#F0F6FC;         /* texto principal */
    --text-dim:#8B949E;     /* texto secundario */
    --text-faint:#6E7681;   /* texto terciario / placeholder */

    /* Accent / marca — azul información, consistente con la referencia GitHub/Vercel */
    --gold:#58A6FF;
    --gold-dim:#1F6FEB;

    /* Estados — un color, un significado, sin abusar */
    --pos:#3FB950;    /* verde — ingresos / positivo */
    --neg:#F85149;    /* rojo — gastos / negativo */
    --warn:#D29922;   /* amarillo — alertas */
    --purple:#A371F7; /* morado — inversiones, exclusivamente */

    /* Sistema de radio y sombra — una sola definición, reutilizada en toda tarjeta */
    --radius:8px;
    --radius-sm:6px;
    --shadow-card:0 1px 0 rgba(1,4,9,.3);
    --shadow-hover:0 8px 24px rgba(1,4,9,.45);

    /* Escala de espaciado — múltiplos de 8px (4px para ajustes finos) */
    --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px; --sp-6:32px; --sp-7:40px;

    /* Escala tonal de morado — solo para inversiones / categorías, nunca +/- */
    --p1:#EDE7FB; --p2:#D7C9F5; --p3:#BFA6EF; --p4:#A371F7;
    --p5:#8957E5; --p6:#6E40C9; --p7:#553098; --p8:#3C2266; --p9:#241540;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);}
  body{
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;
    min-height:100vh;
    font-size:13px;
  }
  ::selection{background:var(--gold);color:#0D1117;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}

  .num{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-feature-settings:'tnum';}

  /* ---------- SIDEBAR ---------- */
  #sidebar{
    width:216px;
    flex-shrink:0;
    background:var(--surface);
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
    position:sticky;
    top:0;
    height:100vh;
  }
  .brand{
    padding:var(--sp-5) var(--sp-5) var(--sp-4) var(--sp-5);
    border-bottom:1px solid var(--line);
  }
  .brand .mark{
    font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;
    font-size:11px;
    letter-spacing:3px;
    color:var(--gold);
    text-transform:uppercase;
  }
  .brand h1{
    font-family:'Inter',sans-serif;
    font-size:17px;
    font-weight:600;
    margin:6px 0 0 0;
    color:var(--text);
    letter-spacing:-0.2px;
  }
  .ruler{
    height:6px;
    background-image:repeating-linear-gradient(90deg, var(--line) 0, var(--line) 1px, transparent 1px, transparent 8px);
    border-bottom:1px solid var(--line);
    margin-bottom:2px;
  }
  nav{flex:1;padding:14px 10px;overflow-y:auto;}
  .nav-group-label{
    font-size:10px;
    letter-spacing:1.5px;
    color:var(--text-faint);
    text-transform:uppercase;
    padding:12px 10px 6px 10px;
  }
  .nav-item{
    display:flex;
    align-items:center;
    gap:11px;
    padding:10px 12px;
    color:var(--text-dim);
    cursor:pointer;
    border-radius:var(--radius);
    font-size:13px;
    font-weight:500;
    transition:background .2s ease, color .2s ease, transform .2s ease;
    user-select:none;
  }
  .nav-item:active{transform:scale(.98);}
  .nav-item .ic{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s ease;}
  .nav-item:hover .ic{transform:scale(1.08);}
  .icn{display:inline-flex;align-items:center;justify-content:center;vertical-align:-3px;color:var(--gold);}

  /* Sistema de iconografía — outline puro, sin relleno, grosor uniforme (16/20/24px) */
  .icon-badge{
    display:inline-flex;align-items:center;justify-content:center;
    flex-shrink:0;
    color:var(--text-dim);
    transition:color .2s ease;
  }
  .icon-badge svg{display:block;}
  .kpi .icon-badge{color:var(--text-dim);}
  .kpi:hover .icon-badge{color:var(--gold);}
  .icn svg{display:block;}
  .nav-item:hover{background:var(--surface-2);color:var(--text);}
  .nav-item.active{background:var(--surface-2);color:var(--text);}
  .nav-item.active .ic{color:var(--gold);}
  .nav-item.active{box-shadow:inset 2px 0 0 var(--gold);}
  .sidebar-footer{
    padding:14px 20px;
    border-top:1px solid var(--line);
    font-size:10.5px;
    color:var(--text-faint);
    line-height:1.6;
  }
  .sidebar-footer .dot{color:var(--pos);}

  /* Mobile nav toggle */
  #menuBtn{
    display:none;
    position:fixed;
    top:14px; left:14px;
    z-index:70;
    width:38px; height:38px;
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:var(--radius);
    font-size:16px;
    align-items:center;justify-content:center;
    cursor:pointer;
  }
  #backdrop{
    display:none;
    position:fixed; inset:0;
    background:rgba(0,0,0,.65);
    z-index:55;
  }
  #backdrop.show{display:block;}
  #closeNavBtn{display:none;}

  /* ---------- MAIN ---------- */
  #main{flex:1;min-width:0;padding:32px 40px 64px 40px;}
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:26px;
    padding-bottom:18px;
    border-bottom:1px solid var(--line);
  }
  .topbar h2{
    font-family:'Inter',sans-serif;
    font-size:22px;
    font-weight:600;
    margin:0;
    letter-spacing:-0.3px;
  }
  .topbar .sub{color:var(--text-dim);font-size:12px;margin-top:4px;}
  .topbar .date{
    font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;
    color:var(--text-faint);
    font-size:11px;
    letter-spacing:.5px;
    text-transform:uppercase;
  }

  #content.fade-in{animation:contentIn .38s cubic-bezier(.16,.9,.35,1);}
  @keyframes contentIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }
  @media (prefers-reduced-motion: reduce){
    #content.fade-in{animation:none;}
    .panel, .kpi, .cat-card, .btn, .nav-item, .icon-badge{transition:none;}
  }

  .section-label{
    font-size:10.5px;
    letter-spacing:1.6px;
    text-transform:uppercase;
    color:var(--text-faint);
    margin:36px 0 16px 0;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .section-label::after{content:'';flex:1;height:1px;background:var(--line);}
  .section-label:first-of-type{margin-top:0;}

  /* KPI cards */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--sp-4);}
  .kpi-grid.small{grid-template-columns:repeat(6,1fr);}
  .kpi{
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow-card);
    padding:var(--sp-5);
    min-height:92px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    transition:border-color .2s ease, box-shadow .2s ease, transform .2s ease;
  }
  .kpi:hover{
    border-color:#3D444D;
    box-shadow:var(--shadow-hover);
    transform:translateY(-2px);
  }
  .kpi-body{display:flex;align-items:center;gap:var(--sp-3);}
  .kpi-text{display:flex;flex-direction:column;gap:6px;min-width:0;}
  .kpi .lbl{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .kpi .val{font-size:20px;font-weight:600;letter-spacing:-0.2px;color:var(--text);}
  .kpi.hero{padding:22px 20px;min-height:106px;}
  .kpi.hero .lbl{font-size:10.5px;letter-spacing:1.4px;}
  .kpi.hero .val{font-size:29px;font-weight:700;letter-spacing:-0.6px;}
  .kpi.small{padding:13px 15px;min-height:70px;}
  .kpi.small .kpi-body{gap:10px;}
  .kpi.small .val{font-size:15px;font-weight:600;}
  .kpi .val.pos{color:var(--pos);}
  .kpi .val.neg{color:var(--neg);}
  .kpi .val.gold{color:var(--gold);}

  .charts-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:20px;margin-top:6px;}
  .charts-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-top:6px;}
  .panel{
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow-card);
    padding:var(--sp-5) var(--sp-5) var(--sp-4) var(--sp-5);
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  .panel:hover{
    border-color:#3D444D;
    box-shadow:var(--shadow-hover);
  }
  .panel h3{
    font-family:'Inter',sans-serif;
    font-size:12.5px;
    font-weight:600;
    margin:0 0 var(--sp-4) 0;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:.5px;
  }
  .chart-wrap{position:relative;height:230px;}
  .chart-wrap.short{height:180px;}

  /* Forms */
  .add-form{
    display:grid;
    gap:11px;
    background:var(--surface);
    border:1px solid var(--line);
    padding:18px;
    margin-bottom:16px;
    grid-template-columns:repeat(auto-fit, minmax(140px,1fr));
    align-items:end;
  }
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:10px;color:var(--text-faint);letter-spacing:.5px;text-transform:uppercase;}
  input,select,textarea{
    background:var(--surface-2);
    border:1px solid var(--line);
    color:var(--text);
    padding:8px 9px;
    font-size:12.5px;
    font-family:'Inter',sans-serif;
    border-radius:var(--radius);
    outline:none;
    width:100%;
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(88,166,255,.25);}
  input[type="date"]{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;}
  .btn{
    background:var(--gold-dim);
    color:#F0F6FC;
    border:1px solid transparent;
    padding:9px 16px;
    font-weight:600;
    font-size:12px;
    letter-spacing:.3px;
    text-transform:uppercase;
    border-radius:var(--radius);
    cursor:pointer;
    transition:opacity .2s ease, transform .2s ease, box-shadow .2s ease, background .2s ease;
    white-space:nowrap;
  }
  .btn:hover{background:var(--gold);transform:translateY(-1px);box-shadow:0 4px 14px -4px rgba(31,111,235,.5);}
  .btn:active{transform:translateY(0) scale(.97);box-shadow:none;}
  .btn.ghost{
    background:transparent;
    color:var(--text-dim);
    border:1px solid var(--line);
  }
  .btn.ghost:hover{color:var(--text);border-color:var(--text-dim);}
  .btn.danger-txt{background:transparent;color:var(--text-faint);border:none;padding:4px 6px;font-size:14px;text-transform:none;}
  .btn.danger-txt:hover{color:var(--neg);}

  /* Table */
  .table-wrap{border:1px solid var(--line);border-radius:var(--radius);background:var(--surface-2);overflow:hidden;overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:600px;}
  thead th{
    text-align:left;
    font-size:10px;
    letter-spacing:.8px;
    text-transform:uppercase;
    color:var(--text-faint);
    padding:12px 14px;
    border-bottom:1px solid var(--line);
    white-space:nowrap;
    position:sticky;top:0;background:var(--surface-2);
  }
  tbody td{
    padding:11px 14px;
    border-bottom:1px solid var(--line-soft);
    color:var(--text);
    white-space:nowrap;
  }
  tbody tr{transition:background .15s ease;}
  tbody tr:hover{background:var(--surface);}
  tbody tr:last-child td{border-bottom:none;}
  .tag{
    display:inline-block;
    padding:2px 9px;
    border-radius:999px;
    font-size:10.5px;
    font-weight:600;
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--text-dim);
  }
  .tag.pos{color:var(--pos);border-color:rgba(63,185,80,.35);background:rgba(63,185,80,.12);}
  .tag.neg{color:var(--neg);border-color:rgba(248,81,73,.35);background:rgba(248,81,73,.12);}
  .tag.warn{color:var(--warn);border-color:rgba(210,153,34,.35);background:rgba(210,153,34,.12);}
  .empty-row td{color:var(--text-faint);text-align:center;padding:32px;font-size:12.5px;}
  .foot-row td{font-weight:600;color:var(--text);background:var(--surface);border-top:1px solid var(--line);}

  .bar-cell{width:120px;}
  .progress{height:5px;background:var(--line-soft);border-radius:3px;overflow:hidden;}
  .progress > div{height:100%;background:var(--pos);}

  .hint{font-size:11.5px;color:var(--text-faint);margin:-6px 0 14px 0;}

  /* Tooltips — reemplaza el title nativo del navegador para íconos sin etiqueta visible */
  [data-tip]{position:relative;}
  [data-tip]::after{
    content:attr(data-tip);
    position:absolute;
    bottom:calc(100% + 7px);
    left:50%;
    transform:translateX(-50%) translateY(4px);
    background:#010409;
    color:var(--text);
    border:1px solid var(--line);
    font-size:11px;
    font-weight:500;
    padding:5px 9px;
    border-radius:6px;
    white-space:nowrap;
    opacity:0;
    visibility:hidden;
    pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
    box-shadow:var(--shadow-hover);
    z-index:80;
  }
  [data-tip]:hover::after{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0);}

  /* Loading state */
  .loading-state{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:var(--sp-4);
    padding:var(--sp-7) 0;
    color:var(--text-faint);
    font-size:12.5px;
  }
  .spinner{
    width:22px;height:22px;
    border-radius:50%;
    border:2px solid var(--line);
    border-top-color:var(--gold);
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* Calendario */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;background:var(--line);border:1px solid var(--line);}
  .cal-weekday{background:var(--surface-2);color:var(--text-faint);font-size:10px;letter-spacing:1px;text-transform:uppercase;text-align:center;padding:9px 4px;}
  .cal-cell{background:var(--surface);min-height:76px;padding:8px;cursor:pointer;transition:background .2s ease;}
  .cal-cell:hover{background:var(--surface-2);}
  .cal-cell.empty{background:var(--bg);cursor:default;}
  .cal-cell.today{box-shadow:inset 0 0 0 2px var(--gold);}
  .cal-cell.selected{background:var(--surface-2);box-shadow:inset 2px 0 0 var(--gold);}
  .cal-daynum{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:12px;color:var(--text-dim);margin-bottom:5px;}
  .cal-amt{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:10.5px;line-height:1.6;}
  .cal-amt.pos{color:var(--pos);}
  .cal-amt.neg{color:var(--neg);}
  .cal-alert{font-size:9.5px;color:var(--warn);margin-top:3px;letter-spacing:.2px;}
  .cal-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line-soft);font-size:12.5px;}
  .cal-row:last-child{border-bottom:none;}
  @media (max-width:900px){
    .cal-cell{min-height:58px;padding:6px;}
    .cal-amt{font-size:9.5px;}
  }

  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

  /* Panel header icon */
  .panel h3{display:flex;align-items:center;gap:9px;}
  .panel h3 .icn{color:var(--gold-dim);}

  /* Gasto por Categoría — análisis interactivo */
  .cat-analysis{display:grid;grid-template-columns:220px 1fr;gap:28px;align-items:start;}
  .donut-wrap{position:relative;height:220px;}
  .donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;}
  .donut-center .amt{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:19px;font-weight:700;color:var(--text);}
  .donut-center .lbl{font-size:8.5px;letter-spacing:1px;text-transform:uppercase;color:var(--text-faint);margin-top:3px;}
  .cat-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
  .cat-card{
    background:var(--surface-2);
    border:1px solid var(--line);
    border-left:3px solid var(--gold);
    border-radius:var(--radius);
    padding:11px 13px;
    cursor:pointer;
    transition:transform .2s ease, border-color .2s ease, background .2s ease;
  }
  .cat-card:hover{background:#1C2128;border-color:#3D444D;transform:translateY(-2px);box-shadow:var(--shadow-hover);}
  .cat-card.active{background:#132043;border-color:var(--gold-dim);box-shadow:0 0 0 1px var(--gold-dim) inset;}
  .cat-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .cat-card-name{font-size:11.5px;font-weight:600;color:var(--text);}
  .cat-card-pct{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:10.5px;color:var(--text-faint);}
  .cat-card-amt{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:15px;font-weight:600;color:var(--text);}
  .subcat-detail{margin-top:20px;border-top:1px solid var(--line);padding-top:16px;}
  .subcat-detail-empty{color:var(--text-faint);font-size:12px;}

  @media (max-width:900px){
    .cat-analysis{grid-template-columns:1fr;}
  }

  @media (max-width:900px){
    body{flex-direction:column;}
    #menuBtn{display:flex;}
    #sidebar{
      position:fixed;
      top:0; left:0;
      width:250px;
      height:100vh;
      z-index:60;
      transform:translateX(-100%);
      transition:transform .25s ease;
      box-shadow:0 0 50px rgba(0,0,0,.6);
    }
    #sidebar.open{transform:translateX(0);}
    #closeNavBtn{
      display:block;
      margin-left:auto;
      background:none;border:none;color:var(--text-dim);
      font-size:18px;cursor:pointer;padding:2px 6px;
    }
    #main{padding:20px 16px 60px 16px; padding-top:64px;}
    .topbar{flex-wrap:wrap;gap:8px;}
    .kpi-grid, .kpi-grid.small{grid-template-columns:repeat(2,1fr);}
    .charts-grid,.charts-grid-3,.two-col{grid-template-columns:1fr;}
    .add-form{grid-template-columns:1fr 1fr;}
    input,select,textarea{font-size:16px;padding:10px;}
    .kpi .val{font-size:18px;}
    .kpi.hero .val{font-size:26px;}
    .kpi.small .val{font-size:14px;}
    table{font-size:12px;}
  }
  @media (max-width:480px){
    .kpi-grid, .kpi-grid.small{grid-template-columns:1fr 1fr;}
    .add-form{grid-template-columns:1fr;}
    .topbar h2{font-size:19px;}
  }
</style>
</head>
<body>

<button id="menuBtn" aria-label="Abrir menú" onclick="toggleSidebar(true)">☰</button>
<div id="backdrop" onclick="toggleSidebar(false)"></div>

<div id="sidebar">
  <div class="brand" style="display:flex;align-items:flex-start;justify-content:space-between;">
    <div>
      <div class="mark">CFO · Personal</div>
      <h1>Finanzas</h1>
    </div>
    <button id="closeNavBtn" onclick="toggleSidebar(false)" aria-label="Cerrar menú">✕</button>
  </div>
  <div class="ruler"></div>
  <nav id="nav"></nav>

function icon(name, size=16, sw=1.75){
  const body = ICONS[name] || ICONS.dashboard;
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${body}</svg>`;
}

/* Ícono contenedor — outline puro, sin relleno, tamaños del sistema: 16 / 20 / 24 */
function iconBadge(name, size){
  const cls = size==='sm' ? ' sm' : (size==='xs' ? ' xs' : '');
  const px = size==='xs' ? 16 : (size==='sm' ? 20 : 24);
  return `<span class="icon-badge${cls}">${icon(name, px, 1.75)}</span>`;
}

const fmtMoney = n => (isFinite(n)?n:0).toLocaleString('es-MX',{style:'currency',currency:'MXN',maximumFractionDigits:0});

/* =========================================================================
   ESTADO Y ALMACENAMIENTO PERSISTENTE
========================================================================= */
const KEYS = ['ingresos','gastos','cuentas','tarjetas','deudas','inversiones','ahorro','metas','suscripciones','extra','subcategorias','proyectos','historico'];
let state = {
  ingresos:[], gastos:[], cuentas:[], tarjetas:[], deudas:[], inversiones:[],
  ahorro:[], metas:[], suscripciones:[], historico:[],
  extra:{ activosOtros:0, pasivosOtros:0, fondoAhorrado:0, fondoMeses:6 },
  subcategorias: JSON.parse(JSON.stringify(DEFAULT_SUBCATS)),
  proyectos: [...DEFAULT_PROYECTOS],
};

const STORAGE_PREFIX = 'finzas_';
async function loadState(){
  for(const k of KEYS){
    try{
      const raw = localStorage.getItem(STORAGE_PREFIX + k);
      if(raw) state[k] = JSON.parse(raw);
    }catch(e){ /* clave aún no existe — se mantiene el valor por defecto */ }
  }
}
async function persist(k){
  try{ localStorage.setItem(STORAGE_PREFIX + k, JSON.stringify(state[k])); }
  catch(e){ console.error('Error al guardar en localStorage', k, e); alert('No se pudo guardar. ¿Tu navegador tiene el almacenamiento local lleno o bloqueado?'); }
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

function setContent(html){
  const el = document.getElementById('content');
  el.innerHTML = html;
  el.classList.remove('fade-in');
  void el.offsetWidth; // fuerza reflow para poder repetir la animación
  el.classList.add('fade-in');
}

const fmtPct = n => (isFinite(n)?n*100:0).toLocaleString('es-MX',{maximumFractionDigits:1})+'%';
const fmtDate = d => { if(!d) return '—'; const dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'2-digit'}); };
const monthKey = d => d ? d.slice(0,7) : '';
const todayISO = () => new Date().toISOString().slice(0,10);
const thisMonthKey = () => todayISO().slice(0,7);

function accountName(id){ const a=state.cuentas.find(x=>x.id===id); return a?a.nombre:'—'; }
function cardName(id){ const t=state.tarjetas.find(x=>x.id===id); return t?t.nombre:'—'; }

/* =========================================================================
   CÁLCULOS FINANCIEROS
========================================================================= */
function gastoTotal(g){ return (g.monto||0)*(1+(g.ivaPct||0)); }
function ingresoNeto(i){ return (i.monto||0)*(1-(i.impuestoPct||0)); }

function cuentaSaldo(c){
  const ing = state.ingresos.filter(i=>i.cuentaId===c.id).reduce((s,i)=>s+(i.monto||0),0);
  const gas = state.gastos.filter(g=>g.cuentaId===c.id).reduce((s,g)=>s+gastoTotal(g),0);
  return (c.saldoInicial||0) + ing - gas;
}
function capitalLiquido(){ return state.cuentas.reduce((s,c)=>s+cuentaSaldo(c),0); }

function tarjetaSaldoUsado(t){
  return state.gastos.filter(g=>g.tarjetaId===t.id).reduce((s,g)=>s+gastoTotal(g),0);
}
function totalTarjetas(){ return state.tarjetas.reduce((s,t)=>s+tarjetaSaldoUsado(t),0); }
function totalDeudas(){ return state.deudas.reduce((s,d)=>s+(d.saldoActual||0),0); }
function totalInversiones(){ return state.inversiones.reduce((s,i)=>s+(i.valorActual||0),0); }
function totalActivos(){ return capitalLiquido()+totalInversiones()+(state.extra.activosOtros||0); }
function totalPasivos(){ return totalDeudas()+totalTarjetas()+(state.extra.pasivosOtros||0); }
function patrimonioNeto(){ return totalActivos()-totalPasivos(); }

function sumInMonth(arr, dateField, amountFn, mk){
  return arr.filter(x=>monthKey(x[dateField])===mk).reduce((s,x)=>s+amountFn(x),0);
}
function ingresosEnMes(mk){ return sumInMonth(state.ingresos,'fecha',i=>i.monto||0, mk); }
function gastosEnMes(mk){ return sumInMonth(state.gastos,'fecha',gastoTotal, mk); }
function inversionEnMes(mk){ return sumInMonth(state.inversiones,'fechaCompra',i=>i.montoInvertido||0, mk); }

function lastMonths(n){
  const out=[]; const d=new Date();
  for(let i=n-1;i>=0;i--){
    const dt = new Date(d.getFullYear(), d.getMonth()-i, 1);
    out.push(dt.toISOString().slice(0,7));
  }
  return out;
}
function monthLabel(mk){
  const [y,m] = mk.split('-').map(Number);
  const dt = new Date(y, m-1, 1);
  return dt.toLocaleDateString('es-MX',{month:'short',year:'2-digit'});
}

function pagoMensualDeudaYTarjetas(){
  const deuda = state.deudas.reduce((s,d)=>s+(d.pagoMensual||0),0);
  const tc = state.tarjetas.reduce((s,t)=>s+tarjetaSaldoUsado(t)*0.03,0);
  return deuda+tc;
}

function subMensual(r){
  const c=r.costo||0;
  switch(r.frecuencia){
    case 'Anual': return c/12;
    case 'Trimestral': return c/3;
    case 'Semestral': return c/6;
    case 'Semanal': return c*4.33;
    default: return c;
  }
}

/* =========================================================================
   RENDER: FORM + TABLE GENÉRICOS
========================================================================= */
function subcatOptionsHTML(cat, selected){
  const opts = (state.subcategorias[cat]||[]);
  return `<option value="">—</option>` + opts.map(o=>`<option value="${o}" ${o===selected?'selected':''}>${o}</option>`).join('');
}

function fieldInput(f, val, record, modKey){
  const v = val===undefined? (f.default!==undefined?f.default:'') : val;
  if(f.type==='select'){
    return `<select data-k="${f.key}"><option value="">—</option>${f.options.map(o=>`<option value="${o}" ${o===v?'selected':''}>${o}</option>`).join('')}</select>`;
  }
  if(f.type==='ref'){
    const list = state[f.ref]||[];
    const nameKey = f.ref==='tarjetas' ? 'nombre' : 'nombre';
    return `<select data-k="${f.key}"><option value="">—</option>${list.map(o=>`<option value="${o.id}" ${o.id===v?'selected':''}>${o[nameKey]}</option>`).join('')}</select>`;
  }
  if(f.type==='proyecto'){
    return `<select data-k="${f.key}"><option value="">—</option>${state.proyectos.map(o=>`<option value="${o}" ${o===v?'selected':''}>${o}</option>`).join('')}</select>`;
  }
  if(f.type==='subcat'){
    const catVal = record ? record[f.catField] : '';
    return `<div style="display:flex;gap:4px;">
      <select data-k="${f.key}" style="flex:1">${subcatOptionsHTML(catVal, v)}</select>
      <button type="button" class="btn ghost" style="padding:0 11px;font-weight:700;" onclick="addSubcat('${modKey}','${f.catField}','${f.key}')" data-tip="Agregar subcategoría">+</button>
    </div>`;
  }
  if(f.type==='date'){
    return `<input type="date" data-k="${f.key}" value="${v||''}">`;
  }
  if(f.type==='currency' || f.type==='number'){
    return `<input type="number" step="0.01" data-k="${f.key}" value="${v||v===0?v:''}" placeholder="0">`;
  }
  if(f.type==='percent'){
    const pv = v ? (v*100) : '';
    return `<input type="number" step="0.1" data-k="${f.key}" data-percent="1" value="${pv}" placeholder="0">`;
  }
  return `<input type="text" data-k="${f.key}" value="${v||''}" placeholder="${f.ph||''}">`;
}

async function addSubcat(modKey, catFieldKey, subFieldKey){
  const form = document.getElementById(`form-${modKey}`);
  const catSel = form.querySelector(`[data-k="${catFieldKey}"]`);
  const cat = catSel ? catSel.value : '';
  if(!cat){ alert('Primero elige una categoría principal arriba — la subcategoría se agrega dentro de ella.'); return; }
  const name = prompt(`Nueva subcategoría dentro de "${cat}":`);
  if(!name) return;
  if(!state.subcategorias[cat]) state.subcategorias[cat] = [];
  if(!state.subcategorias[cat].includes(name)) state.subcategorias[cat].push(name);
  await persist('subcategorias');
  const subSel = form.querySelector(`[data-k="${subFieldKey}"]`);
  if(subSel) subSel.innerHTML = subcatOptionsHTML(cat, name);
}

function wireForm(key){
  const mod = MODULES[key];
  const form = document.getElementById(`form-${key}`);
  if(!form) return;
  mod.fields.forEach(f=>{
    if(f.type==='subcat'){
      const catSel = form.querySelector(`[data-k="${f.catField}"]`);
      const subSel = form.querySelector(`[data-k="${f.key}"]`);
      if(catSel && subSel){
        catSel.addEventListener('change', ()=>{ subSel.innerHTML = subcatOptionsHTML(catSel.value, ''); });
      }
    }
  });
}

let editingId = {};

function renderModule(key){
  const mod = MODULES[key];
  const data = state[key];
  const editRec = editingId[key] ? data.find(r=>r.id===editingId[key]) : null;

  let html = `<div class="add-form" id="form-${key}">`;
  mod.fields.forEach(f=>{
    html += `<div class="field"><label>${f.label}</label>${fieldInput(f, editRec?editRec[f.key]:undefined, editRec, key)}</div>`;
  });
  if(editRec){
    html += `<div class="field"><label>&nbsp;</label><div style="display:flex;gap:8px;">
      <button class="btn" onclick="saveRecord('${key}')">Guardar cambios</button>
      <button class="btn ghost" onclick="cancelEdit('${key}')">Cancelar</button>
    </div></div>`;
  } else {
    html += `<div class="field"><label>&nbsp;</label><button class="btn" onclick="saveRecord('${key}')">Agregar</button></div>`;
  }
  html += `</div>`;
  if(editRec){
    html = `<div class="hint" style="color:var(--gold);font-style:normal;">✎ Editando registro — cambia los valores y presiona "Guardar cambios".</div>` + html;
  }

  html += `<div class="table-wrap"><table><thead><tr>`;
  mod.fields.forEach(f=>{ if(f.type!=='ref') html += `<th>${f.label}</th>`; });
  (mod.extraCols||[]).forEach(c=>html+=`<th>${c.label}</th>`);
  (mod.computed||[]).forEach(c=>html+=`<th>${c.label}</th>`);
  html += `<th></th></tr></thead><tbody>`;

  if(data.length===0){
    const colspan = mod.fields.filter(f=>f.type!=='ref').length + (mod.extraCols||[]).length + (mod.computed||[]).length + 1;
    html += `<tr class="empty-row"><td colspan="${colspan}">Aún no hay registros. Agrega el primero arriba ↑</td></tr>`;
  }

  data.slice().reverse().forEach(r=>{
    html += `<tr>`;
    mod.fields.forEach(f=>{
      if(f.type==='ref') return;
      let v = r[f.key];
      if(f.type==='currency') v = fmtMoney(v||0);
      else if(f.type==='percent') v = fmtPct(v||0);
      else if(f.type==='date') v = fmtDate(v);
      else if(v===undefined||v==='') v='—';
      const isNumCls = (f.type==='currency'||f.type==='percent') ? 'num' : '';
      html += `<td class="${isNumCls}">${v}</td>`;
    });
    (mod.extraCols||[]).forEach(c=>{ html += `<td>${c.calc(r)}</td>`; });
    (mod.computed||[]).forEach(c=>{
      const raw = c.calc(r);
      if(c.type==='bar'){
        const pct = Math.min(Math.max(raw,0),1);
        html += `<td><div class="bar-cell"><div class="progress"><div style="width:${pct*100}%"></div></div><div style="font-size:10.5px;color:var(--text-faint);margin-top:3px;" class="num">${fmtPct(raw)}</div></div></td>`;
      } else if(c.type==='currency'){
        const cls = c.cls?c.cls(r):'';
        html += `<td class="num ${cls}">${fmtMoney(raw)}</td>`;
      } else if(c.type==='percent'){
        let tagcls = c.tag?c.tag(r):(c.cls?c.cls(r):'');
        html += `<td class="num"><span class="tag ${tagcls}">${fmtPct(raw)}</span></td>`;
      } else {
        html += `<td>${raw}</td>`;
      }
    });
    html += `<td style="white-space:nowrap;">`;
    if(mod.quickAction){
      html += `<button class="btn ghost" style="padding:4px 8px;font-size:10.5px;margin-right:4px;" onclick="${mod.quickAction.handler}('${key}','${r.id}')" title="${mod.quickAction.title}">${mod.quickAction.label}</button>`;
    }
    html += `<button class="btn ghost" style="padding:4px 8px;font-size:10.5px;margin-right:4px;" onclick="startEdit('${key}','${r.id}')" title="Editar">Editar</button>`;
    html += `<button class="btn danger-txt" onclick="deleteRecord('${key}','${r.id}')" data-tip="Eliminar">✕</button>`;
    html += `</td>`;
    html += `</tr>`;
  });
  html += `</tbody></table></div>`;
  setContent(html);
  wireForm(key);
}

function startEdit(key, id){
  editingId[key] = id;
  renderModule(key);
  document.getElementById('content').scrollIntoView({behavior:'smooth'});
}
function cancelEdit(key){
  editingId[key] = null;
  renderModule(key);
}

async function saveRecord(key){
  const mod = MODULES[key];
  const form = document.getElementById(`form-${key}`);
  const rec = editingId[key] ? {id: editingId[key]} : {id:uid()};
  let hasValue = false;
  mod.fields.forEach(f=>{
    const el = form.querySelector(`[data-k="${f.key}"]`);
    let v = el.value;
    if(v!=='') hasValue = true;
    if(f.type==='currency' || f.type==='number'){ v = v===''? 0 : parseFloat(v); }
    else if(f.type==='percent'){ v = v===''? 0 : parseFloat(v)/100; }
    rec[f.key] = v;
  });
  if(!hasValue){ return; }
  if(editingId[key]){
    const idx = state[key].findIndex(r=>r.id===editingId[key]);
    if(idx>-1) state[key][idx] = rec;
    editingId[key] = null;
  } else {
    state[key].push(rec);
  }
  await persist(key);
  renderModule(key);
}
async function deleteRecord(key, id){
  state[key] = state[key].filter(r=>r.id!==id);
  if(editingId[key]===id) editingId[key]=null;
  await persist(key);
  renderModule(key);
}

/* ---- Acción rápida: registrar el pago mensual de una deuda ---- */
async function registrarPago(key, id){
  const d = state.deudas.find(r=>r.id===id);
  if(!d) return;
  const interes = (d.saldoActual||0) * ((d.tasaAnual||0)/12);
  const abonoCapital = Math.max((d.pagoMensual||0) - interes, 0);
  d.saldoActual = Math.max((d.saldoActual||0) - abonoCapital, 0);
  await persist('deudas');
  alert(`Pago registrado.\nInterés del mes: ${fmtMoney(interes)}\nAbono a capital: ${fmtMoney(abonoCapital)}\nNuevo saldo: ${fmtMoney(d.saldoActual)}`);
  renderModule(key);
}

/* =========================================================================
   GASTO POR CATEGORÍA — donut + tarjetas interactivas + desglose subcategoría
========================================================================= */
const CAT_PALETTE = ['#A371F7','#8957E5','#6E40C9','#BFA6EF','#553098','#D7C9F5','#3C2266','#EDE7FB','#241540','#A371F7'];

function gastosPorCategoriaMes(mk){
  const map = {};
  state.gastos.filter(g=>monthKey(g.fecha)===mk).forEach(g=>{
    map[g.categoria] = (map[g.categoria]||0) + gastoTotal(g);
  });
  return map;
}
function subcategoriasPorCategoriaMes(cat, mk){
  const map = {};
  state.gastos.filter(g=>g.categoria===cat && monthKey(g.fecha)===mk).forEach(g=>{
    const key = g.subcategoria || '(Sin subcategoría)';
    map[key] = (map[key]||0) + gastoTotal(g);
  });
  return map;
}

function renderCategoryAnalysis(){
  const mk = thisMonthKey();
  const map = gastosPorCategoriaMes(mk);
  const sorted = Object.keys(map).filter(k=>map[k]>0).sort((a,b)=>map[b]-map[a]);
  const total = sorted.reduce((s,k)=>s+map[k],0);
  window.catAnalysisOrder = sorted;

  document.getElementById('catPieCenterAmt').textContent = fmtMoney(total);

  const wrap = document.getElementById('catCardsWrap');
  if(sorted.length===0){
    wrap.innerHTML = `<div class="hint" style="margin:0;">Aún no hay gastos este mes.</div>`;
  } else {
    wrap.innerHTML = sorted.map((cat,i)=>{
      const amt = map[cat];
      const pct = total? Math.round(amt/total*100) : 0;
      const color = CAT_PALETTE[i % CAT_PALETTE.length];
      const active = window.selectedCategory===cat ? 'active' : '';
      return `<div class="cat-card ${active}" data-cat="${cat}" style="border-left-color:${color};" onclick="selectCategoryCard('${cat.replace(/'/g,"\\'")}')">
        <div class="cat-card-top"><span class="cat-card-name">${cat}</span><span class="cat-card-pct">${pct}%</span></div>
        <div class="cat-card-amt">${fmtMoney(amt)}</div>
        <div class="progress" style="margin-top:7px;"><div style="width:${pct}%;background:${color}"></div></div>
      </div>`;
    }).join('');
  }

  if(charts.catPie) charts.catPie.destroy();
  chartDefaults();
  charts.catPie = new Chart(document.getElementById('chartCatPie'), {
    type:'doughnut',
    data:{
      labels: sorted.length?sorted:['Sin gastos'],
      datasets:[{
        data: sorted.length?sorted.map(k=>map[k]):[1],
        backgroundColor: sorted.length? sorted.map((_,i)=>CAT_PALETTE[i%CAT_PALETTE.length]) : ['#21262D'],
        borderColor:'#1C2128', borderWidth:3, hoverOffset:6,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false, cutout:'72%',
      plugins:{ legend:{display:false}, tooltip:{enabled:sorted.length>0} },
      onClick:(evt, els)=>{ if(els.length && sorted.length){ selectCategoryCard(sorted[els[0].index]); } }
    }
  });

  if(window.selectedCategory && sorted.includes(window.selectedCategory)){
    renderSubcatDetail(window.selectedCategory, mk);
  } else {
    window.selectedCategory = null;
    document.getElementById('subcatDetail').innerHTML = `<div class="subcat-detail-empty">Selecciona una categoría para ver su desglose por subcategoría este mes.</div>`;
  }
}

function selectCategoryCard(cat){
  window.selectedCategory = (window.selectedCategory===cat) ? null : cat;
  document.querySelectorAll('.cat-card').forEach(el=>{
    el.classList.toggle('active', el.dataset.cat===window.selectedCategory);
  });
  const mk = thisMonthKey();
  if(window.selectedCategory){
    renderSubcatDetail(window.selectedCategory, mk);
  } else {
    document.getElementById('subcatDetail').innerHTML = `<div class="subcat-detail-empty">Selecciona una categoría para ver su desglose por subcategoría este mes.</div>`;
  }
}

function renderSubcatDetail(cat, mk){
  const el = document.getElementById('subcatDetail');
  if(!el) return;
  const map = subcategoriasPorCategoriaMes(cat, mk);
  const keys = Object.keys(map).sort((a,b)=>map[b]-map[a]);
  const total = keys.reduce((s,k)=>s+map[k],0);
  let html = `<div class="section-label" style="margin:0 0 10px 0;">${iconBadge('tag','xs')}${cat} — por subcategoría</div>`;
  if(keys.length===0){
    html += `<div class="subcat-detail-empty">Sin subcategorías registradas en "${cat}" este mes.</div>`;
  } else {
    keys.forEach(k=>{
      const pct = total? (map[k]/total*100) : 0;
      html += `<div class="cal-row">
        <span>${k}</span>
        <span style="display:flex;align-items:center;gap:10px;">
          <span style="width:90px;"><div class="progress"><div style="width:${pct}%;background:var(--gold)"></div></div></span>
          <span class="num" style="min-width:80px;text-align:right;">${fmtMoney(map[k])}</span>
        </span>
      </div>`;
    });
  }
  el.innerHTML = html;
}

    <div class="num" style="font-size:38px;font-weight:700;color:${pn>=0?'#3FB950':'#F85149'};margin-top:6px;">${fmtMoney(pn)}</div>
  </div>
  <div class="hint" style="margin-top:16px;">Los campos "Otros" son de captura manual (bienes raíces, vehículos, préstamos personales, etc.) y se guardan automáticamente.</div>
  `;
  setContent(html);
  document.getElementById('activosOtrosInput').addEventListener('change', async e=>{
    state.extra.activosOtros = parseFloat(e.target.value)||0;
    await persist('extra'); renderPatrimonio();
  });
  document.getElementById('pasivosOtrosInput').addEventListener('change', async e=>{
    state.extra.pasivosOtros = parseFloat(e.target.value)||0;
    await persist('extra'); renderPatrimonio();
  });
}

/* =========================================================================
   PRESUPUESTO (vista dedicada — usa localStorage 'extra.presupuesto')
========================================================================= */
function renderPresupuesto(){
  if(!state.extra.presupuesto) state.extra.presupuesto = {};
  const mk = thisMonthKey();
  let html = `<div class="hint" style="margin-top:0;">"Ahorro" funciona al revés que las demás categorías: es tu meta mensual de aportación — verde si ya la cumpliste o superaste, rojo si vas corto. Regístralo como un gasto normal con categoría "Ahorro" cuando transfieras dinero a tu cuenta de ahorro.</div>`;
  html += `<div class="table-wrap"><table><thead><tr>
    <th>Categoría</th><th>Presupuesto / Meta</th><th>Gastado / Aportado</th><th>Diferencia</th><th style="width:140px">% Logrado</th><th>Estado</th>
  </tr></thead><tbody>`;
  let totalBud=0, totalSpent=0;
  CAT_GAS.forEach(cat=>{
    const isAhorro = cat==='Ahorro';
    const bud = state.extra.presupuesto[cat] || 0;
    const spent = state.gastos.filter(g=>g.categoria===cat && monthKey(g.fecha)===mk).reduce((s,g)=>s+gastoTotal(g),0);
    totalBud+=bud; totalSpent+=spent;
    const pct = bud? spent/bud : 0;
    let tagCls, tagTxt, barColor, diffCls;
    if(isAhorro){
      tagCls = pct>=1?'pos':(pct>=0.5?'warn':'neg');
      tagTxt = pct>=1?'Cumplido':(pct>=0.5?'A la mitad':'Corto');
      barColor = pct>=1?'#3FB950':(pct>=0.5?'#D29922':'#F85149');
      diffCls = (bud-spent)>0?'neg':'pos';
    } else {
      tagCls = pct>1?'neg':(pct>0.8?'warn':'pos');
      tagTxt = pct>1?'Excedido':(pct>0.8?'Alerta':'Bien');
      barColor = pct>1?'#F85149':(pct>0.8?'#D29922':'#3FB950');
      diffCls = (bud-spent)<0?'neg':'';
    }
    html += `<tr>
      <td>${cat}${isAhorro?' <span class="tag pos" style="margin-left:6px;">meta</span>':''}</td>
      <td><input type="number" step="50" value="${bud}" data-cat="${cat}" class="budget-input" style="width:110px"></td>
      <td class="num">${fmtMoney(spent)}</td>
      <td class="num ${diffCls}">${fmtMoney(bud-spent)}</td>
      <td><div class="progress"><div style="width:${Math.min(pct*100,100)}%;background:${barColor}"></div></div></td>
      <td><span class="tag ${tagCls}">${tagTxt}</span></td>
    </tr>`;
  });
  html += `<tr class="foot-row"><td>Total</td><td class="num">${fmtMoney(totalBud)}</td><td class="num">${fmtMoney(totalSpent)}</td><td class="num">${fmtMoney(totalBud-totalSpent)}</td><td></td><td></td></tr>`;
  html += `</tbody></table></div>`;
  setContent(html);
  document.querySelectorAll('.budget-input').forEach(inp=>{
    inp.addEventListener('change', async e=>{
      state.extra.presupuesto[e.target.dataset.cat] = parseFloat(e.target.value)||0;
      await persist('extra'); renderPresupuesto();
    });
  });
}

/* =========================================================================
   CATEGORÍAS Y PROYECTOS (configuración editable)
========================================================================= */
function renderConfig(){
  let html = `
  <div class="two-col">
    <div class="panel">
      <h3>Proyectos / Negocios</h3>
      <div class="hint">Estos nombres aparecen en el campo "Proyecto" de Ingresos y Gastos. Cambiar un nombre aquí no reescribe registros ya guardados con el nombre anterior.</div>
      <div id="proyectosList"></div>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <input type="text" id="newProyectoInput" placeholder="Nombre del nuevo proyecto">
        <button class="btn" onclick="addProyecto()">Agregar</button>
      </div>
    </div>
    <div class="panel">
      <h3>Subcategorías</h3>
      <div class="hint">Elige una categoría principal y agrégale subcategorías propias (ej. Transporte → Gasolina, Metro).</div>
      <div class="field" style="margin-bottom:14px;">
        <label>Categoría Principal</label>
        <select id="subcatCategorySelect" onchange="renderSubcatManager()">
          ${CAT_GAS.map(c=>`<option value="${c}">${c}</option>`).join('')}
        </select>
      </div>
      <div id="subcatTags" style="margin-bottom:6px;"></div>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <input type="text" id="newSubcatInput" placeholder="Nueva subcategoría">
        <button class="btn" onclick="addSubcatFromConfig()">Agregar</button>
      </div>
    </div>
  </div>
  <div class="hint" style="margin-top:18px;">Las categorías principales (Vivienda, Transporte, Sofía, Harumy, etc.) están fijas para mantener tus reportes consistentes — solo las subcategorías y los proyectos son libres.</div>
  `;
  setContent(html);
  renderProyectosList();
  renderSubcatManager();
}

function renderProyectosList(){
  const el = document.getElementById('proyectosList');
  if(!el) return;
  el.innerHTML = state.proyectos.length ? state.proyectos.map((p,i)=>`
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">
      <input type="text" value="${p}" onchange="renameProyecto(${i}, this.value)" style="flex:1">
      <button class="btn danger-txt" onclick="deleteProyecto(${i})" data-tip="Eliminar">✕</button>
    </div>
  `).join('') : `<div class="hint">Sin proyectos aún.</div>`;
}
async function addProyecto(){
  const inp = document.getElementById('newProyectoInput');
  const name = inp.value.trim();
  if(!name) return;
  state.proyectos.push(name);
  await persist('proyectos');
  inp.value='';
  renderProyectosList();
}
async function renameProyecto(idx, value){
  const v = value.trim();
  if(v) state.proyectos[idx] = v;
  await persist('proyectos');
}
async function deleteProyecto(idx){
  state.proyectos.splice(idx,1);
  await persist('proyectos');
  renderProyectosList();
}

function renderSubcatManager(){
  const sel = document.getElementById('subcatCategorySelect');
  const cat = sel ? sel.value : CAT_GAS[0];
  const el = document.getElementById('subcatTags');
  if(!el) return;
  const subs = state.subcategorias[cat]||[];
  el.innerHTML = subs.length ? subs.map(s=>`
    <span class="tag" style="margin:0 6px 8px 0;display:inline-flex;align-items:center;gap:7px;">
      ${s} <span style="cursor:pointer;color:var(--text-faint);" onclick="removeSubcat('${cat.replace(/'/g,"\\'")}','${s.replace(/'/g,"\\'")}')">✕</span>
    </span>
  `).join('') : `<div class="hint" style="margin:0;">Sin subcategorías en "${cat}" todavía.</div>`;
}
async function addSubcatFromConfig(){
  const sel = document.getElementById('subcatCategorySelect');
  const cat = sel.value;
  const inp = document.getElementById('newSubcatInput');
  const name = inp.value.trim();
  if(!name) return;
  if(!state.subcategorias[cat]) state.subcategorias[cat] = [];
  if(!state.subcategorias[cat].includes(name)) state.subcategorias[cat].push(name);
  await persist('subcategorias');
  inp.value='';
  renderSubcatManager();
}
async function removeSubcat(cat, name){
  state.subcategorias[cat] = (state.subcategorias[cat]||[]).filter(s=>s!==name);
  await persist('subcategorias');
  renderSubcatManager();
}

/* =========================================================================
   CALENDARIO
========================================================================= */
function money0(n){ return (isFinite(n)?n:0).toLocaleString('es-MX',{maximumFractionDigits:0}); }

function recurringAlertsForDate(dateObj){
  const day = dateObj.getDate();
  const iso = dateObj.toISOString().slice(0,10);
  const alerts = [];
  state.gastos.forEach(g=>{
    if(g.recurrente==='Sí' && g.diaRecurrente && parseInt(g.diaRecurrente)===day){
      alerts.push({label:`${g.categoria}${g.proveedor?' · '+g.proveedor:''}`, monto:g.monto||0});
    }
  });
  state.suscripciones.forEach(s=>{
    if(s.activa==='Sí' && s.proximoPago===iso){
      alerts.push({label:`Suscripción · ${s.servicio}`, monto:s.costo||0});
    }
  });
  return alerts;
}

function renderCalendario(){
  if(!window.calMonth){ window.calMonth = new Date(); window.calMonth.setDate(1); }
  const y = window.calMonth.getFullYear();
  const m = window.calMonth.getMonth();
  const firstDay = new Date(y,m,1);
  const startOffset = firstDay.getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const monthName = firstDay.toLocaleDateString('es-MX',{month:'long',year:'numeric'});
  const todayIso = todayISO();

  let html = `
  <div class="panel" style="margin-bottom:20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
      <button class="btn ghost" onclick="changeCalMonth(-1)">← Anterior</button>
      <h3 style="margin:0;text-transform:capitalize;font-size:15px;color:var(--text);">${monthName}</h3>
      <button class="btn ghost" onclick="changeCalMonth(1)">Siguiente →</button>
    </div>
    <div class="cal-grid">
      ${['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'].map(d=>`<div class="cal-weekday">${d}</div>`).join('')}
  `;
  for(let i=0;i<startOffset;i++) html += `<div class="cal-cell empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateObj = new Date(y,m,d);
    const iso = dateObj.toISOString().slice(0,10);
    const dayIng = state.ingresos.filter(x=>x.fecha===iso).reduce((s,x)=>s+(x.monto||0),0);
    const dayGas = state.gastos.filter(x=>x.fecha===iso).reduce((s,x)=>s+gastoTotal(x),0);
    const alerts = recurringAlertsForDate(dateObj);
    const isToday = iso===todayIso;
    const isSel = iso===window.calSelectedDate;
    html += `<div class="cal-cell ${isToday?'today':''} ${isSel?'selected':''}" onclick="selectCalDay('${iso}')">
      <div class="cal-daynum">${d}</div>
      ${dayIng>0?`<div class="cal-amt pos">+${money0(dayIng)}</div>`:''}
      ${dayGas>0?`<div class="cal-amt neg">-${money0(dayGas)}</div>`:''}
      ${alerts.length?`<div class="cal-alert" title="${alerts.map(a=>a.label).join(', ')}">● ${alerts.length} próx.</div>`:''}
    </div>`;
  }
  const totalCells = startOffset + daysInMonth;
  const trailing = (7 - (totalCells % 7)) % 7;
  for(let i=0;i<trailing;i++) html += `<div class="cal-cell empty"></div>`;
  html += `</div></div>`;
  html += `<div class="panel" id="calDetail"></div>`;
  setContent(html);
  if(window.calSelectedDate) selectCalDay(window.calSelectedDate);
  else document.getElementById('calDetail').innerHTML = `<h3>Detalle del Día</h3><div class="hint" style="margin:0;">Toca un día del calendario para ver el detalle.</div>`;
}

function changeCalMonth(delta){
  window.calMonth.setMonth(window.calMonth.getMonth()+delta);
  window.calSelectedDate = null;
  renderCalendario();
}

function selectCalDay(iso){
  window.calSelectedDate = iso;
  renderCalendario();
  const el = document.getElementById('calDetail');
  if(!el) return;
  const dateObj = new Date(iso+'T00:00:00');
  const label = dateObj.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const dayIngresos = state.ingresos.filter(x=>x.fecha===iso);
  const dayGastos = state.gastos.filter(x=>x.fecha===iso);
  const alerts = recurringAlertsForDate(dateObj);
  let html = `<h3 style="text-transform:capitalize;">${label}</h3>`;
  if(dayIngresos.length===0 && dayGastos.length===0 && alerts.length===0){
    html += `<div class="hint" style="margin:0;">Sin movimientos este día.</div>`;
  }
  if(dayIngresos.length){
    html += `<div class="section-label" style="margin:14px 0 4px 0;">Ingresos</div>`;
    dayIngresos.forEach(i=>{ html += `<div class="cal-row"><span>${i.fuente||i.categoria||'—'}</span><span class="num pos">${fmtMoney(i.monto||0)}</span></div>`; });
  }
  if(dayGastos.length){
    html += `<div class="section-label" style="margin:14px 0 4px 0;">Gastos</div>`;
    dayGastos.forEach(g=>{ html += `<div class="cal-row"><span>${g.categoria}${g.subcategoria?' · '+g.subcategoria:''}${g.proveedor?' · '+g.proveedor:''}</span><span class="num neg">${fmtMoney(gastoTotal(g))}</span></div>`; });
  }
  if(alerts.length){
    html += `<div class="section-label" style="margin:14px 0 4px 0;">Próximos Pagos Recurrentes</div>`;
    alerts.forEach(a=>{ html += `<div class="cal-row"><span><span class="tag warn">Recurrente</span> ${a.label}</span><span class="num">${fmtMoney(a.monto)}</span></div>`; });
  }
  el.innerHTML = html;
}

  {group:'General', items:[
    {key:'dashboard', label:'Dashboard', ic:'dashboard', title:'Dashboard', sub:'Resumen general de tus finanzas'},
    {key:'calendario', label:'Calendario', ic:'calendar', title:'Calendario', sub:'Tus ingresos y gastos en el tiempo'},
  ]},
  {group:'Flujo Diario', items:[
    {key:'ingresos', label:'Ingresos', ic:'up', title:'Ingresos', sub:'Registro de todas tus entradas de dinero'},
    {key:'gastos', label:'Gastos', ic:'down', title:'Gastos', sub:'Registro de todas tus salidas de dinero'},
    {key:'presupuesto', label:'Presupuesto', ic:'budget', title:'Presupuesto', sub:'Control mensual por categoría'},
  ]},
  {group:'Patrimonio', items:[
    {key:'cuentas', label:'Cuentas', ic:'bank', title:'Cuentas Bancarias', sub:'Tu capital líquido, calculado en automático'},
    {key:'tarjetas', label:'Tarjetas', ic:'card', title:'Tarjetas de Crédito', sub:'Utilización y alertas de tus tarjetas'},
    {key:'deudas', label:'Deudas', ic:'scale', title:'Deudas', sub:'Créditos y préstamos activos'},
    {key:'inversiones', label:'Inversiones', ic:'trending', title:'Inversiones', sub:'Tu portafolio completo'},
    {key:'patrimonio', label:'Patrimonio Neto', ic:'target', title:'Patrimonio Neto', sub:'Activos menos pasivos'},
  ]},
  {group:'Metas', items:[
    {key:'ahorro', label:'Ahorro', ic:'coins', title:'Ahorro', sub:'Metas de ahorro de corto plazo'},
    {key:'metas', label:'Objetivos', ic:'star', title:'Objetivos y Metas', sub:'Casa, auto, viajes, negocio, retiro'},
    {key:'suscripciones', label:'Suscripciones', ic:'repeat', title:'Suscripciones', sub:'Todo lo que se cobra recurrente'},
  ]},
  {group:'Sistema', items:[
    {key:'config', label:'Categorías y Proyectos', ic:'settings', title:'Categorías y Proyectos', sub:'Administra subcategorías y nombres de proyectos'},
  ]},
  {group:'Archivo', items:[
    {key:'historico', label:'Histórico Anual', ic:'archive', title:'Histórico Anual', sub:'Resumen guardado de tus años anteriores (2021–2025)'},
  ]},
];

function buildNav(){
  const nav = document.getElementById('nav');
  let html='';
  NAV.forEach(g=>{
    html += `<div class="nav-group-label">${g.group}</div>`;
    g.items.forEach(it=>{
      html += `<div class="nav-item" data-key="${it.key}"><span class="ic">${iconBadge(it.ic,'xs')}</span>${it.label}</div>`;
    });
  });
  nav.innerHTML = html;
  nav.querySelectorAll('.nav-item').forEach(el=>{
    el.addEventListener('click', ()=>goTo(el.dataset.key));
  });
}

function findNavItem(key){
  for(const g of NAV) for(const it of g.items) if(it.key===key) return it;
  return null;
}

function toggleSidebar(open){
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('backdrop');
  const mb = document.getElementById('menuBtn');
  sb.classList.toggle('open', open);
  bd.classList.toggle('show', open);
  mb.style.display = open ? 'none' : '';
}

function goTo(key){
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active', el.dataset.key===key));
  const it = findNavItem(key);
  document.getElementById('page-title').textContent = it.title;
  document.getElementById('page-sub').textContent = it.sub;
  if(key==='dashboard') renderDashboard();
  else if(key==='patrimonio') renderPatrimonio();
  else if(key==='presupuesto') renderPresupuesto();
  else if(key==='config') renderConfig();
  else if(key==='calendario') renderCalendario();
  else renderModule(key);
  currentKey = key;
  if(window.innerWidth<=900) toggleSidebar(false);
  window.scrollTo({top:0, behavior:'instant'});
}
let currentKey = 'dashboard';

/* =========================================================================
   INIT
========================================================================= */
(async function init(){
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('es-MX',{weekday:'long', day:'2-digit', month:'long', year:'numeric'});
  buildNav();
  await loadState();
  goTo('dashboard');

  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{
      navigator.serviceWorker.register('sw.js').catch(err=>{
        console.warn('No se pudo registrar el service worker (normal si abres el archivo directo con file://):', err);
      });
    });
  }
})();
</script>
